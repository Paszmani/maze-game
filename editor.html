<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kiosk Maze — Editor de Tema</title>
    <style>
      :root {
        --bg: #0c1024;
        --panel: #151a35;
        --line: #2a3160;
        --accent: #ffcc00;
        --text: #e8ebff;
        --muted: #9aa3d0;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        display: grid;
        grid-template-columns: 1fr 460px;
        height: 100vh;
        overflow: hidden;
      }
      #form {
        overflow-y: auto;
        padding: 20px 24px 80px;
      }
      #side {
        background: var(--panel);
        border-left: 1px solid var(--line);
        display: flex;
        flex-direction: column;
        padding: 16px;
        gap: 12px;
      }
      h1 { font-size: 20px; margin: 0 0 4px; }
      .sub { color: var(--muted); font-size: 13px; margin: 0 0 20px; }
      details {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        margin-bottom: 12px;
        padding: 4px 14px;
      }
      summary { cursor: pointer; font-weight: 600; padding: 10px 0; user-select: none; }
      .row {
        display: grid;
        grid-template-columns: 160px 1fr;
        align-items: center;
        gap: 10px;
        margin: 8px 0;
      }
      .row label { color: var(--muted); font-size: 13px; }
      input[type='text'], input[type='number'], select {
        background: #0c1024;
        border: 1px solid var(--line);
        color: var(--text);
        border-radius: 6px;
        padding: 7px 9px;
        font-size: 14px;
        width: 100%;
      }
      input[type='color'] { width: 48px; height: 30px; border: 1px solid var(--line); background: none; border-radius: 6px; }
      input[type='file'] { font-size: 12px; color: var(--muted); }
      .sprite { display: flex; align-items: center; gap: 10px; }
      .sprite img { width: 40px; height: 40px; object-fit: contain; background: #0c1024; border: 1px solid var(--line); border-radius: 6px; }
      .lead-field { border: 1px solid var(--line); border-radius: 6px; padding: 10px; margin: 8px 0; }
      .lead-field .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
      button {
        background: var(--accent);
        color: #1a1300;
        border: none;
        border-radius: 6px;
        padding: 10px 14px;
        font-weight: 700;
        cursor: pointer;
        font-size: 14px;
      }
      button.ghost { background: transparent; color: var(--text); border: 1px solid var(--line); font-weight: 600; }
      button.small { padding: 5px 9px; font-size: 12px; }
      iframe { width: 100%; flex: 1; border: 1px solid var(--line); border-radius: 8px; background: #000; }
      .actions { display: flex; gap: 8px; flex-wrap: wrap; }
      .hint { color: var(--muted); font-size: 12px; line-height: 1.5; }
    </style>
  </head>
  <body>
    <div id="form">
      <h1>Editor de Tema</h1>
      <p class="sub">Monte a aparência da marca e baixe um <code>theme.json</code>. Nenhum código necessário.</p>
      <div id="sections"></div>
    </div>
    <div id="side">
      <strong>Prévia ao vivo</strong>
      <iframe id="preview" src="/?preview=1" title="Prévia do jogo"></iframe>
      <div class="actions">
        <button id="refresh">Atualizar prévia</button>
        <button id="play" class="ghost">Abrir em tela cheia</button>
      </div>
      <div class="actions">
        <button id="download">Baixar theme.json</button>
        <label class="ghost" style="padding:10px 14px;border:1px solid var(--line);border-radius:6px;cursor:pointer;font-weight:600;font-size:14px;">
          Importar…
          <input id="import" type="file" accept="application/json,.json" style="display:none" />
        </label>
      </div>
      <p class="hint">A prévia usa o motor real do jogo. As imagens são embutidas no <code>theme.json</code> como data-URI — um único arquivo carrega tudo.</p>
    </div>
    <script type="module" src="/src/editor/editor.ts"></script>
  </body>
</html>
