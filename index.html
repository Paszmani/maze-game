<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Kiosk Maze</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #000010;
        overflow: hidden;
        touch-action: none;
      }
      /* Viewport explicito: o Phaser (Scale.FIT) precisa de um container com
         largura real. Em layout flex o #game colapsava para 0 de largura. */
      #game {
        width: 100vw;
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
